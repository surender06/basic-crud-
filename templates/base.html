<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Django App{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .rect {
            height: 100px;
            width: 100%;
            background-color: red;
            color: white;
            text-align: center;
            line-height: 100px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        h1{
            heigjt:10px;
            width:100%;
            
        }
    </style>
</head>

<body class="container mt-4">

    <!-- 🔥 Navbar / Header -->
    <h2 class="text-center">My Django App</h2>
    <hr>

    <!-- 🔥 Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-success">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- 🔥 Main Content -->
    {% block content %}
    {% endblock %}

</body>
</html>
